<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCI Simple Web App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <p class="badge">Running on Oracle Cloud Infrastructure</p>
        <h1>Simple OCI Web App</h1>
        <p class="subtitle">
          This static app is served by NGINX on an OCI Compute VM.
        </p>

        <div class="status-grid">
          <article>
            <h2>Environment</h2>
            <p id="env">Production Demo</p>
          </article>
          <article>
            <h2>Server Time</h2>
            <p id="server-time">--:--:--</p>
          </article>
        </div>

        <div class="actions">
          <button id="refresh-btn">Refresh Time</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
